<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Nachi ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            color: white;
            overflow: hidden;
        }

        /* --- CONTENEDORES --- */
        .main-container { width: 90%; max-width: 600px; z-index: 10; position: relative; }

        /* --- SECCIÓN TARTA --- */
        #cake-section {
            background: #fff0f5; padding: 30px; border-radius: 30px;
            text-align: center; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 30px rgba(244, 143, 177, 0.4);
        }
        .bday-banner { background: #f48fb1; color: white; padding: 10px 25px; border-radius: 12px; font-weight: bold; margin-bottom: 15px; }
        .cake-image { width: 250px; border-radius: 15px; }
        .wish-text { font-family: 'Pacifico', cursive; color: #880e4f; font-size: 20px; margin-top: 10px; }

        /* --- SECCIÓN CARTA (OCULTA AL INICIO) --- */
        #letter-section {
            display: none; width: 100%;
        }
        .letter-paper {
            background-color: #fffde7; border-radius: 20px; padding: 30px;
            border: 5px solid #f48fb1; color: #3e2723;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .letter-content h1 { color: #b71c1c; text-align: center; margin-bottom: 20px; }
        .letter-content p { margin-bottom: 15px; line-height: 1.6; font-size: 17px; }
        .final-message { font-weight: bold; text-align: center; color: #880e4f; margin-top: 20px; font-size: 22px; opacity: 0; transition: 2s; }

        /* --- LLUVIA DE CORAZONES --- */
        #hearts-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        .heart { position: absolute; top: -50px; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) translateX(30px); opacity: 0; } }

        /* --- MÚSICA --- */
        #music-btn { position: fixed; bottom: 20px; right: 20px; background: #f48fb1; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 30px; z-index: 100; }

        /* --- ANIMACIÓN TRANSICIÓN --- */
        .fade-out { animation: fadeOut 1s forwards; }
        @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.9); } }
    </style>
</head>
<body>

    <div id="music-btn" onclick="toggleMusic()">🎵</div>
    <div id="hearts-container"></div>
    <div id="player" style="position: absolute; top: -1000px;"></div>

    <div class="main-container">
