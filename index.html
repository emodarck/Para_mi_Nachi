<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Nachi ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cake-visual">
        <div class="cake">
            <div class="plate"></div>
            <div class="layer layer-bottom"></div>
            <div class="layer layer-middle"></div>
            <div class="layer layer-top"></div>
            <div class="icing"></div>
            <div class="candle-container">
                <div class="candle"><div class="flame"></div></div>
            </div>
        </div>
        <h2 class="cake-text">¡Pide un deseo, Nachi! 🎂</h2>
    </div>

    <div id="letter-container">
        <div class="hearts">
            <div class="heart h1"></div><div class="heart h2"></div><div class="heart h3"></div><div class="heart h4"></div>
            <div class="heart h5"></div><div class="heart h6"></div><div class="heart h7"></div><div class="heart h8"></div>
        </div>
        <div class="letter">
            <h1>¡FELIZ CUMPLEAÑOS, MARTIN! 🎂🔥</h1>
            <p>¡Llegó tu día! Quería decirte que me encanta el camino que estamos armando juntos. ❤️</p>
            <p>Eres una persona maravillosa y te quiero demasiado. ¡Que este año sea increíble!</p>
            <p class="final-message">¡TE AMO MUCHO! ❤️😊✨</p>
        </div>
    </div>

</body>
</html>
